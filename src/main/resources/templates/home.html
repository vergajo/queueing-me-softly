<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Dashboard</title>
</head>
<body>
<div layout:fragment="headerStats">
    <div class="stat-badges">
        <span class="badge badge-blue" th:text="'👥 ' + ${allPlayers.size()} + ' Players'">👥 0 Players</span>
        <span class="badge badge-green" th:text="'⏳ ' + ${waitingQueue.size()} + ' Waiting'">⏳ 0 Waiting</span>
        <span class="badge badge-orange" th:text="'🏸 ' + ${activeCourtCount} + ' Active'">🏸 0 Active</span>
    </div>
</div>
<div layout:fragment="content">
    <div id="dashboard" hx-get="/refresh" hx-trigger="every 30s">
        <div th:include="~{fragments/dashboard}"></div>
    </div>
</div>
</body>
</html>
